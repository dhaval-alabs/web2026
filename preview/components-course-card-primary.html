<!doctype html>
<html><head><meta charset="utf-8" /><title>Course Card — Primary</title>
<link rel="stylesheet" href="../ui_kits/website/styles.css" />
<style>body { margin:0; padding:24px; background:#F4FBFF; }</style>
</head><body>
  <div style="max-width:380px">
    <article class="course-card" data-variant="primary">
      <span class="cc-strip"></span>
      <span class="cc-glow"></span>
      <header class="cc-head">
        <span class="cc-badge">Most Popular ✦</span>
        <span class="cc-duration">10.5 mo</span>
      </header>
      <h3 class="cc-title">Data Science Specialization with AI</h3>
      <p class="cc-desc">10.5-month flagship that takes you from spreadsheets to autonomous AI agents — and gets you hired.</p>
      <ul class="cc-chips">
        <li class="tag-sky">Python</li><li class="tag-sky">SQL</li><li class="tag-teal">GenAI</li><li class="tag-teal">LangChain</li>
      </ul>
      <div class="cc-meta">
        <span class="cc-meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Live Online</span>
        <span class="cc-meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5l-8-3z"/><path d="m9 12 2 2 4-4"/></svg>Nasscom Certified</span>
      </div>
      <div class="cc-price-row">
        <div class="cc-price">₹58,000</div>
        <div class="cc-price-note">+ GST · 10.5 months · Full AI stack</div>
      </div>
      <a href="#" class="cc-cta cc-cta-ghost">Reserve My Seat ↗</a>
    </article>
  </div>
</body></html>
