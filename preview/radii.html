<!doctype html>
<html><head><meta charset="utf-8" /><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:#fff; font-family:var(--font-body); color:var(--navy); }
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap:14px; }
  .item { text-align:center; }
  .box { aspect-ratio:1/1; background:var(--grad-soft); border:1.5px solid rgba(0,217,126,0.3); }
  .label { font-family:var(--font-display); font-weight:700; font-size:0.74rem; margin-top:8px; }
  .px { font-size:0.66rem; color:var(--muted-light); }
</style></head><body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:5px"></div><div class="label">xs</div><div class="px">5px · chips</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="label">sm</div><div class="px">8px · inputs</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="label">md</div><div class="px">10px · btn</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="label">lg</div><div class="px">16px · cards</div></div>
    <div class="item"><div class="box" style="border-radius:20px"></div><div class="label">2xl</div><div class="px">20px · feature</div></div>
    <div class="item"><div class="box" style="border-radius:100px"></div><div class="label">pill</div><div class="px">100px</div></div>
  </div>
</body></html>
