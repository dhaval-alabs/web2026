<!doctype html>
<html><head><meta charset="utf-8" /><title>Course Card — Compact</title>
<link rel="stylesheet" href="../ui_kits/website/styles.css" />
<style>body { margin:0; padding:24px; background:#F4FBFF; }</style>
</head><body>
  <div style="max-width:340px">
    <article class="course-card" data-variant="compact">
      <span class="cc-strip"></span>
      <header class="cc-head">
        <span class="cc-badge">Engineering</span>
        <span class="cc-duration">7 mo</span>
      </header>
      <h3 class="cc-title">Big Data Engineering</h3>
      <p class="cc-desc">Hadoop, Spark and cloud data pipelines for the engineers who make analytics possible at scale.</p>
      <ul class="cc-chips">
        <li class="tag-sky">Spark</li><li class="tag-sky">Hadoop</li><li class="tag-sky">AWS</li>
      </ul>
      <div class="cc-meta">
        <span class="cc-meta-item"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Live Online</span>
      </div>
      <div class="cc-price-row">
        <div class="cc-price">₹62,000</div>
        <div class="cc-price-note">+ GST · 7 months</div>
      </div>
      <a href="#" class="cc-cta cc-cta-primary">Explore Course →</a>
    </article>
  </div>
</body></html>
