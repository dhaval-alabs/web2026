<!doctype html>
<html><head><meta charset="utf-8" /><title>Neutral Palette</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:#fff; font-family: var(--font-body); }
  .grid { display:grid; grid-template-columns: repeat(5, 1fr); gap:12px; }
  .swatch { border-radius:12px; overflow:hidden; border:1px solid rgba(11,26,61,0.10); }
  .chip { height:84px; }
  .meta { padding:10px 12px; }
  .name { font-family:var(--font-display); font-weight:700; font-size:0.78rem; color:var(--navy); margin-bottom:2px; }
  .hex { font-size:0.7rem; color:var(--muted-light); font-variant-numeric: tabular-nums; }
</style></head><body>
  <div class="grid">
    <div class="swatch"><div class="chip" style="background:#FFFFFF;border-bottom:1px solid #eee"></div><div class="meta"><div class="name">white</div><div class="hex">#FFFFFF</div></div></div>
    <div class="swatch"><div class="chip" style="background:#F4FBFF"></div><div class="meta"><div class="name">body-bg</div><div class="hex">#F4FBFF</div></div></div>
    <div class="swatch"><div class="chip" style="background:#F8FAFC"></div><div class="meta"><div class="name">admin-bg</div><div class="hex">#F8FAFC</div></div></div>
    <div class="swatch"><div class="chip" style="background:#5A6E8A"></div><div class="meta"><div class="name">muted-light</div><div class="hex">#5A6E8A</div></div></div>
    <div class="swatch"><div class="chip" style="background:#4A5870"></div><div class="meta"><div class="name">muted</div><div class="hex">#4A5870</div></div></div>
  </div>
</body></html>
