<!doctype html>
<html><head><meta charset="utf-8" /><title>Logos</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:0; font-family:var(--font-body); }
  .grid { display:grid; grid-template-columns:1fr 1fr; }
  .panel { padding:28px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; min-height:140px; }
  .light { background:#F4FBFF; }
  .dark { background:#0B1A3D; }
  .light img { max-height:48px; }
  .dark img { max-height:40px; }
  .label { font-size:0.66rem; letter-spacing:0.10em; text-transform:uppercase; font-weight:700; }
  .light .label { color:#1A4A8F; }
  .dark .label { color:rgba(255,255,255,0.55); }
</style></head><body>
  <div class="grid">
    <div class="panel light"><img src="../assets/AnalytixLabs Logo 2024.png" alt="AnalytixLabs"/><div class="label">Light · Wordmark</div></div>
    <div class="panel dark"><img src="../assets/Alabs Icon 2024 white.webp" alt="AL"/><div class="label">Dark · Mark</div></div>
    <div class="panel light"><img src="../assets/Logo icon.svg" alt="AL icon"/><div class="label">Vector · Mark</div></div>
    <div class="panel light" style="background:white"><img src="../assets/Final Logo IITP IITB 2026.webp" alt="IIT lockup" style="max-height:60px;max-width:90%"/><div class="label">Co-brand · IIT</div></div>
  </div>
</body></html>
