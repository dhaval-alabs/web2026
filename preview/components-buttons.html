<!doctype html>
<html><head><meta charset="utf-8" /><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:32px; background:var(--body-bg); font-family:var(--font-body); }
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap:18px; align-items:start; }
  .group { display:flex; flex-direction:column; gap:12px; align-items:flex-start; }
  .label { font-size:0.65rem; color:var(--muted-light); letter-spacing:0.12em; text-transform:uppercase; font-weight:700; }
</style></head><body>
  <div class="grid">
    <div class="group">
      <div class="label">Primary</div>
      <button class="btn-primary">Reserve My Seat ↗</button>
      <button class="btn-primary" style="opacity:0.92;transform:translateY(-2px);box-shadow:0 12px 36px rgba(0,217,126,0.38)">Hover</button>
    </div>
    <div class="group">
      <div class="label">Secondary</div>
      <button class="btn-secondary">Explore Curriculum</button>
      <button class="btn-secondary" style="border-color:#6EDAFD;box-shadow:0 6px 24px rgba(110,218,253,0.20);transform:translateY(-2px)">Hover</button>
    </div>
    <div class="group">
      <div class="label">On Dark</div>
      <div style="background:#0B1A3D;padding:18px;border-radius:12px;width:100%;display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn-primary">Enquire ↗</button>
        <button class="btn-secondary" style="background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85);border-color:rgba(255,255,255,0.20)">Download Syllabus</button>
      </div>
    </div>
    <div class="group">
      <div class="label">Specs</div>
      <div style="font-size:0.78rem;color:var(--muted);line-height:1.7">
        Radius 10px · Padding 0.9rem 2rem<br/>
        Body weight 700 · 0.95rem<br/>
        Hover: lift 2px + tinted shadow
      </div>
    </div>
  </div>
</body></html>
