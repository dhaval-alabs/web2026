<!doctype html>
<html><head><meta charset="utf-8" /><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:#fff; font-family:var(--font-body); color:var(--navy); }
  .grid { display:grid; grid-template-columns:repeat(8,1fr); gap:12px; }
  .item { aspect-ratio:1/1; background:#F4FBFF; border:1px solid rgba(110,218,253,0.25); border-radius:12px; display:flex; align-items:center; justify-content:center; }
  .item.lucide svg { width:22px; height:22px; color:var(--navy); }
  .item.emoji { font-size:1.5rem; line-height:1; }
  .legend { display:flex; gap:18px; margin-top:14px; font-size:0.72rem; color:var(--muted-light); }
  .legend strong { color:var(--navy); font-weight:700; }
</style></head><body>
  <div class="grid">
    <!-- Lucide-style stroke icons (1.75–2px) -->
    <div class="item lucide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m7 14 4-4 4 4 5-5"/></svg></div>
    <div class="item lucide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
    <div class="item lucide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div>
    <div class="item lucide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5l-8-3z"/><path d="m9 12 2 2 4-4"/></svg></div>
    <div class="item lucide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/><circle cx="12" cy="12" r="4"/></svg></div>
    <div class="item lucide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
    <div class="item lucide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
    <div class="item lucide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
    <!-- Emoji set used on landing pages -->
    <div class="item emoji">🤖</div>
    <div class="item emoji">📊</div>
    <div class="item emoji">📈</div>
    <div class="item emoji">⚙️</div>
    <div class="item emoji">🛡️</div>
    <div class="item emoji">💻</div>
    <div class="item emoji">🎥</div>
    <div class="item emoji">🏫</div>
  </div>
  <div class="legend">
    <span><strong>Top row:</strong> lucide-react · 1.5–2px stroke · UI affordances</span>
    <span><strong>Bottom row:</strong> emoji-as-icon · 1.6–2.5rem · marketing surfaces only</span>
  </div>
</body></html>
