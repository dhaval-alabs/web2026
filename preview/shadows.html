<!doctype html>
<html><head><meta charset="utf-8" /><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:32px; background:#F4FBFF; font-family:var(--font-body); color:var(--navy); }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:24px; }
  .item { text-align:center; }
  .box { background:white; border-radius:16px; aspect-ratio: 5/3; border:1px solid rgba(110,218,253,0.15); }
  .label { font-family:var(--font-display); font-weight:700; font-size:0.74rem; margin-top:14px; }
  .desc { font-size:0.66rem; color:var(--muted-light); }
</style></head><body>
  <div class="grid">
    <div class="item"><div class="box" style="box-shadow:0 2px 16px rgba(110,218,253,0.06)"></div><div class="label">shadow-1</div><div class="desc">subtle card</div></div>
    <div class="item"><div class="box" style="box-shadow:0 4px 32px rgba(0,217,126,0.07)"></div><div class="label">shadow-2</div><div class="desc">glass card</div></div>
    <div class="item"><div class="box" style="box-shadow:0 6px 24px rgba(0,217,126,0.30)"></div><div class="label">shadow-4</div><div class="desc">primary btn rest</div></div>
    <div class="item"><div class="box" style="box-shadow:0 12px 36px rgba(0,217,126,0.38)"></div><div class="label">shadow-5</div><div class="desc">primary btn hover</div></div>
    <div class="item"><div class="box" style="box-shadow:0 6px 24px rgba(110,218,253,0.20)"></div><div class="label">shadow-3</div><div class="desc">secondary hover</div></div>
    <div class="item"><div class="box" style="box-shadow:0 16px 56px rgba(11,26,61,0.18);background:#0B1A3D"></div><div class="label">shadow-6</div><div class="desc">dark hero card</div></div>
  </div>
</body></html>
