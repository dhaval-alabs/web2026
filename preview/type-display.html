<!doctype html>
<html><head><meta charset="utf-8" /><title>Type — Display (Manrope)</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:28px; background:#fff; font-family: var(--font-body); color:var(--navy); }
  .row { display:flex; align-items:baseline; gap:18px; padding:8px 0; border-bottom:1px dashed rgba(11,26,61,0.08); }
  .row:last-child { border:none; }
  .label { font-size:0.7rem; color:var(--muted-light); width:72px; flex-shrink:0; }
  .spec { font-family:'Manrope',sans-serif; letter-spacing:-0.022em; line-height:1.15; }
  .meta { margin-left:auto; font-size:0.66rem; color:var(--muted-light); font-variant-numeric: tabular-nums; }
</style></head><body>
  <div class="row"><div class="label">H1</div><div class="spec" style="font-size:2.4rem;font-weight:800">Career Transformation</div><div class="meta">Manrope 800 · clamp(2.4–3.6rem)</div></div>
  <div class="row"><div class="label">H2</div><div class="spec" style="font-size:1.8rem;font-weight:700">Pick Your Track</div><div class="meta">Manrope 700 · clamp(1.9–2.7rem)</div></div>
  <div class="row"><div class="label">H3</div><div class="spec" style="font-size:1.35rem;font-weight:700">Data Analytics + AI</div><div class="meta">Manrope 700 · 1.35rem</div></div>
  <div class="row"><div class="label">Stat</div><div class="spec" style="font-size:2rem;font-weight:800">10.5mo</div><div class="meta">Manrope 800 · 2.2rem</div></div>
  <div class="row"><div class="label">Price</div><div class="spec" style="font-size:1.6rem;font-weight:800">₹58,000</div><div class="meta">Manrope 800 · 1.85rem</div></div>
</body></html>
