<!doctype html>
<html><head><meta charset="utf-8" /><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:#fff; font-family:var(--font-body); color:var(--navy); }
  .row { display:flex; align-items:center; gap:14px; padding:8px 0; }
  .bar { background:var(--grad); height:14px; border-radius:4px; }
  .name { font-family:var(--font-display); font-weight:700; font-size:0.74rem; width:64px; }
  .px { font-size:0.66rem; color:var(--muted-light); width:64px; font-variant-numeric:tabular-nums; }
</style></head><body>
  <div class="row"><div class="name">space-1</div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="name">space-2</div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="name">space-3</div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="name">space-4</div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="name">space-5</div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="name">space-6</div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="name">space-7</div><div class="bar" style="width:40px"></div><div class="px">40px</div></div>
  <div class="row"><div class="name">space-8</div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="name">space-9</div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
  <div class="row"><div class="name">space-10</div><div class="bar" style="width:100px"></div><div class="px">100px · section</div></div>
</body></html>
